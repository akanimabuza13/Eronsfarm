<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eron's Farm</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Eron's Farm</h1>
    </header>
    <main>
        <section id="farm">
            <h2>Your Farm</h2>
            <div class="farm-grid">
                <!-- Dynamically generated farm grid will go here -->
            </div>
        </section>
        <section id="inventory">
            <h2>Inventory</h2>
            <ul class="inventory-list">
                <!-- Inventory items will be displayed here -->
            </ul>
        </section>
        <section id="shop">
            <h2>Shop</h2>
            <div class="shop-items">
                <!-- Shop items will go here -->
            </div>
        </section>
        <section id="controls">
            <h2>Game Controls</h2>
            <button id="plantBtn">Plant</button>
            <button id="harvestBtn">Harvest</button>
            <button id="sellBtn">Sell</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Eron's Farm. All rights reserved.</p>
    </footer>
</body>
</html>
